[build.environment]
NODE_VERSION = "22"
NODE_OPTIONS = "--max-old-space-size=6144"

[dev]
  publish = "docs/"
  framework = "#static"

[[plugins]]
  package = "@netlify/plugin-lighthouse"

  [plugins.inputs]
    fail_deploy_on_score_thresholds = "true"

  [[plugins.inputs.audits]]
    path = "streaming/current/home/index.html"

  [plugins.inputs.settings]
    preset = "desktop"

# Agent discovery: Link headers for homepage and root paths
# Note: "/" redirects to "/home/" so we need headers on both
[[headers]]
  for = "/"
  [headers.values]
    Link = '''</.well-known/api-catalog>; rel="api-catalog", </.well-known/mcp/server-card.json>; rel="mcp-server", </api/>; rel="service-doc"; title="API Documentation", </llms.txt>; rel="llms-txt"; title="LLM-friendly documentation", </.well-known/agent-skills/index.json>; rel="agent-skills"'''

[[headers]]
  for = "/home/"
  [headers.values]
    Link = '''</.well-known/api-catalog>; rel="api-catalog", </.well-known/mcp/server-card.json>; rel="mcp-server", </api/>; rel="service-doc"; title="API Documentation", </llms.txt>; rel="llms-txt"; title="LLM-friendly documentation", </.well-known/agent-skills/index.json>; rel="agent-skills"'''

[[headers]]
  for = "/home/index.html"
  [headers.values]
    Link = '''</.well-known/api-catalog>; rel="api-catalog", </.well-known/mcp/server-card.json>; rel="mcp-server", </api/>; rel="service-doc"; title="API Documentation", </llms.txt>; rel="llms-txt"; title="LLM-friendly documentation", </.well-known/agent-skills/index.json>; rel="agent-skills"'''

[[headers]]
  for = "/index.html"
  [headers.values]
    Link = '''</.well-known/api-catalog>; rel="api-catalog", </.well-known/mcp/server-card.json>; rel="mcp-server", </api/>; rel="service-doc"; title="API Documentation", </llms.txt>; rel="llms-txt"; title="LLM-friendly documentation", </.well-known/agent-skills/index.json>; rel="agent-skills"'''

# Allows us to fetch the API specs in local builds.
[[headers]]
  for = "/api/_attachments/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"

# For future use. Allows us to host docs under the `/api/` path that other services such as Redpanda Cloud can consume.
#[[headers]]
#  for = "/api/*"
#  [headers.values]
#    Access-Control-Allow-Origin = "*"

# NOTE the following redirects get appended to the redirects defined in the _redirects file

# ========== Markdown URL support ==========
# Direct access to markdown files with proper naming (no index.md)
# Markdown files are generated at the same path as HTML files, just with .md extension

# Top-level component directories (redirect to home pages)
[[redirects]]
from = "/current.md"
to = "/streaming/current/home.md"
status = 200

# New component names (post-rename)
[[redirects]]
from = "/streaming.md"
to = "/streaming/current/home.md"
status = 200

[[redirects]]
from = "/cloud-data-platform.md"
to = "/cloud-data-platform/home.md"
status = 200

[[redirects]]
from = "/connect.md"
to = "/connect/home.md"
status = 200

[[redirects]]
from = "/labs.md"
to = "/labs/home.md"
status = 200

# Legacy component names (keep for backwards compatibility)
[[redirects]]
from = "/redpanda-cloud.md"
to = "/cloud-data-platform/home.md"
status = 301

[[redirects]]
from = "/redpanda-connect.md"
to = "/connect/home.md"
status = 301

[[redirects]]
from = "/redpanda-labs.md"
to = "/labs/home.md"
status = 301

# Redirect old index.md URLs to new .md structure
[[redirects]]
from = "/*/index.md"
to = "/:splat.md"
status = 301

[[redirects]]
from = "https://docs.vectorized.io/*"
to = "https://docs.redpanda.com/:splat"
status = 301
force = true

[[edge_functions]]
path = "/api/*"
function = "proxy-api-docs"

# Serve markdown content when Accept: text/markdown header is present
[[edge_functions]]
path = "/*"
function = "serve-markdown"

