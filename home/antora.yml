name: home
title: Home
version: ~
start_page: index.adoc
nav:
- modules/ROOT/nav.adoc
asciidoc:
  attributes:
    # Whether ADP (Agentic Data Plane) content renders on the shared home page.
    # Default OFF so builds that don't aggregate the adp-docs component (25.x branches,
    # per-repo previews) hide ADP links instead of emitting broken-xref errors.
    # Overridden to 'true' in the docs-site playbooks that aggregate adp-docs.
    site-adp-enabled: 'false'
    # Component metadata for navigation system
    component-metadata:
      title: "Home"
      description: "Redpanda Documentation"
      color: "#6366f1"
      icon: "home"
      order: 0
    # Components to show in the home page navigation sidebar
    page-nav-components: 'agentic-data-plane,data-platform'
    # Navigation hierarchy configuration (config-driven navigation)
    page-navigation:
      - home:
          - agentic-data-plane
          - data-platform:
              - cloud-data-platform
              - self-managed:
                  - streaming
                  - connect
    # Data for the home page
    page-ai-suggestions:
      - "How do I write from Redpanda Streaming to Snowflake?"
      - "What's the difference between Redpanda and Kafka?"
      - "Which Iceberg catalogs does Redpanda Cloud support?"
      - "How do I create a CDC pipeline from MongoDB to Redpanda Cloud?"
      - "How do I write from Redpanda Cloud to Google BigQuery?"
      - "How do I create a CDC pipeline from Postgres to Redpanda Cloud?"
      - "How do I create a CDC pipeline from MySQL to Redpanda Cloud?"
    page-intro: 'Find tutorials, guides, and API references to help you build with Redpanda, the modern streaming data platform for mission-critical workloads.'
    page-row:
      - title: Get started
        items:
          - title: 'Serverless'
            image: serverless.svg
            description: 'Get fast, efficient, and scalable data streaming without infrastructure management.'
            urls:
              - url: 'cloud-data-platform:get-started:cluster-types/serverless.adoc'
          - title: 'BYOC'
            image: byoc.svg
            description: 'Run fully managed Redpanda clusters in your own cloud (AWS, Azure, or GCP) for additional security and data isolation.'
            urls:
              - url: 'cloud-data-platform:get-started:cluster-types/byoc/index.adoc'
          - title: 'Self-Managed'
            image: self-managed.svg
            description: 'Run Redpanda on your own infrastructure with complete control over your deployment and configuration.'
            urls:
              - url: 'streaming:get-started:quick-start.adoc'
          - title: 'Connect'
            image: connect.svg
            description: 'Integrate data across systems with hundreds of prebuilt connectors, including AI and change data capture (CDC).'
            urls:
              - url: 'connect:get-started:quickstarts/rpk.adoc'
          - title: 'Agentic Data Plane'
            image: adp.svg
            description: 'Build, deploy, and govern AI agents at scale with enterprise governance, cost controls, and compliance-grade audit trails.'
            urls:
              - url: 'agentic-data-plane:home:index.adoc'
