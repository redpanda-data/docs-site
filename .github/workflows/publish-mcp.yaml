name: Update MCP registry

on:
  pull_request:
    paths:
      - "netlify/functions/mcp.mjs"
      - "netlify/functions/mcp-oauth.mjs"
      - "server.json"
  push:
    branches: [ main ]
    paths:
      - "netlify/functions/mcp.mjs"
      - "netlify/functions/mcp-oauth.mjs"
      - "server.json"
  workflow_dispatch:

# Workflow-level default: read-only. id-token is granted only to the publish
# job below (least privilege) — the validate-only PR job doesn't need it.
permissions:
  contents: read

jobs:
  # On PRs: validate server.json only. We deliberately do NOT bump the version
  # or commit to the PR branch — the version is computed at publish time (below),
  # so PR branches stay free of version-bump commits.
  validate_on_pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (for jq availability)
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Validate server.json
        run: |
          echo "Validating server.json..."
          if [ ! -f server.json ]; then
            echo "Error: server.json not found!"
            exit 1
          fi
          if ! jq empty server.json 2>/dev/null; then
            echo "Error: server.json is not valid JSON!"
            exit 1
          fi
          if ! jq -e '.name and .version and .remotes' server.json > /dev/null; then
            echo "Error: server.json missing required fields (name, version, remotes)"
            exit 1
          fi
          echo "server.json is valid"

  # On push to main (or manual dispatch): compute a fresh version and publish.
  publish_on_main:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # only this job needs it (registry auth)
    concurrency:
      group: mcp-publish-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (for jq availability)
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Validate server.json
        run: |
          echo "Validating server.json..."
          if [ ! -f server.json ]; then
            echo "Error: server.json not found!"
            exit 1
          fi
          if ! jq empty server.json 2>/dev/null; then
            echo "Error: server.json is not valid JSON!"
            exit 1
          fi
          if ! jq -e '.name and .version and .remotes' server.json > /dev/null; then
            echo "Error: server.json missing required fields (name, version, remotes)"
            exit 1
          fi
          echo "server.json is valid"

      - name: Compute publish version
        run: |
          # Computed here (at publish time), so the version increases in MERGE
          # order and no version-bump commit is needed on PR branches.
          #
          # The registry orders releases by SemVer precedence, which looks ONLY
          # at MAJOR.MINOR.PATCH — build metadata after '+' is ignored. So we keep
          # the strictly increasing value in the core: year . MMDD-as-int . run.
          # MMDD is an integer (Jun 22 -> 622, Dec 5 -> 1205) so there are no
          # leading zeros (which would make the version invalid SemVer).
          YEAR="$(date -u +%Y)"
          MMDD="$(( 10#$(date -u +%m) * 100 + 10#$(date -u +%d) ))"
          VERSION="${YEAR}.${MMDD}.${{ github.run_number }}"   # e.g. 2026.622.4531
          echo "Publishing version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          # Write it into the copy we publish (not committed back to the repo).
          jq --arg v "$VERSION" '.version = $v' server.json > server.tmp.json
          mv server.tmp.json server.json

      - name: Install MCP Publisher
        run: |
          echo "Downloading MCP Publisher..."
          ARCH="$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')"
          DOWNLOAD_URL="https://github.com/modelcontextprotocol/registry/releases/download/v1.0.0/mcp-publisher_1.0.0_${ARCH}.tar.gz"

          if ! curl -fsSL "$DOWNLOAD_URL" | tar xz mcp-publisher; then
            echo "Error: Failed to download or extract mcp-publisher"
            echo "Attempted URL: $DOWNLOAD_URL"
            exit 1
          fi

          chmod +x mcp-publisher
          ./mcp-publisher --version
          echo "MCP Publisher installed successfully"

      - name: Log in to MCP Registry (DNS)
        run: |
          echo "Logging in to MCP Registry..."
          if [ -z "${{ secrets.MCP_REGISTRY_PRIVATE_KEY }}" ]; then
            echo "Error: MCP_REGISTRY_PRIVATE_KEY secret is not set"
            exit 1
          fi

          ./mcp-publisher login dns --domain redpanda.com --private-key "${{ secrets.MCP_REGISTRY_PRIVATE_KEY }}"
          echo "Successfully logged in"

      - name: Publish to MCP Registry
        run: |
          echo "Publishing to MCP Registry..."
          echo "Version: $VERSION"

          if ./mcp-publisher publish; then
            echo "Successfully published to MCP Registry"
          else
            echo "Error: Failed to publish to MCP Registry"
            exit 1
          fi

      - name: Verify publication
        run: |
          echo "Publication Summary:"
          echo "  Server Name: $(jq -r '.name' server.json)"
          echo "  Version: $VERSION"
          echo "  Remote URL: $(jq -r '.remotes[0].url' server.json)"
          echo ""
          echo "MCP server successfully published!"
